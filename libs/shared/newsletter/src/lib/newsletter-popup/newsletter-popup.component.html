@if (visible()) {
  <div class="nlp-backdrop" (click)="close()" aria-hidden="true"></div>
  <div class="nlp" role="dialog" aria-modal="true" [attr.aria-label]="title()">
    <button type="button" class="nlp__close" (click)="close()" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <lib-newsletter-form
      [title]="title()"
      [description]="description()"
      [submitLabel]="submitLabel()"
      [successMessage]="successMessage()"
      layout="stacked"
      [source]="source()"
      (subscribed)="onSubscribed()"
    />
  </div>
}
